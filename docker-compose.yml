services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: yesihave-postgres
    environment:
      POSTGRES_DB: yesihave
      POSTGRES_USER: yesihave
      POSTGRES_PASSWORD: yesihave
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yesihave -d yesihave"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    container_name: yesihave-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
  minio-init:
    image: minio/mc:RELEASE.2025-02-15T10-36-16Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done &&
      mc mb --ignore-existing local/coasters
      "

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yesihave-app
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/yesihave
      DB_USER: yesihave
      DB_PASSWORD: yesihave
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: coasters
      APP_TELEGRAM_TOKEN: ${APP_TELEGRAM_TOKEN:-}
      APP_EMBEDDING_PROVIDER: ${APP_EMBEDDING_PROVIDER:-deterministic}
      APP_EMBEDDING_DIMENSION: ${APP_EMBEDDING_DIMENSION:-512}
      APP_ONNX_MODEL_PATH: ${APP_ONNX_MODEL_PATH:-/app/models/clip-vitb32.onnx}
      APP_ONNX_INPUT_NAME: ${APP_ONNX_INPUT_NAME:-}
      APP_ONNX_OUTPUT_NAME: ${APP_ONNX_OUTPUT_NAME:-}
      APP_EMBEDDING_MODEL_VERSION: ${APP_EMBEDDING_MODEL_VERSION:-deterministic-v1}
    ports:
      - "8080:8080"
    volumes:
      - ./models:/app/models:ro

volumes:
  pg_data:
  minio_data:
