spring:
  application:
    name: yesihave
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 55MB
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/yesihave}
    username: ${DB_USER:yesihave}
    password: ${DB_PASSWORD:yesihave}
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

app:
  embedding:
    provider: ${APP_EMBEDDING_PROVIDER:onnx}
    onnx-model-path: ${APP_ONNX_MODEL_PATH:}
    onnx-input-name: ${APP_ONNX_INPUT_NAME:}
    onnx-output-name: ${APP_ONNX_OUTPUT_NAME:}
    dimension: ${APP_EMBEDDING_DIMENSION:512}
    model-version: ${APP_EMBEDDING_MODEL_VERSION:clip-vitb32-v1}
  matching:
    match-pair-threshold: ${APP_MATCH_PAIR_THRESHOLD:0.90}
    match-min-side-threshold: ${APP_MATCH_MIN_SIDE_THRESHOLD:0.86}
    uncertain-pair-threshold: ${APP_UNCERTAIN_PAIR_THRESHOLD:0.84}
    top-k-side: ${APP_MATCH_TOP_K_SIDE:20}
    top-k-response: ${APP_MATCH_TOP_K_RESPONSE:3}
  telegram:
    token: ${APP_TELEGRAM_TOKEN:}
    username: ${TELEGRAM_BOT_USERNAME:}
  storage:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:coasters}
